name: Setup Node CI
description: Check out the repository, set up Node.js (LTS), and install dependencies with npm ci

runs:
  using: composite
  steps:
    - name: Use current Node version
      uses: actions/setup-node@v6
      with:
        node-version: lts/*
        cache: npm
        
    - name: Install dependencies
      run: npm ci
      shell: bash
