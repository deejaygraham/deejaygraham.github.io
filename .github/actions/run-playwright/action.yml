name: Run Playwright
description: Run Playwright tests, optionally against a local static site and with extra CLI args.

inputs:
  with_local_site:
    description: When true, start python http.server for site_directory and set PLAYWRIGHT_BASE_URL and PLAYWRIGHT_SKIP_LIVE.
    default: "false"
  site_directory:
    description: Directory served when with_local_site is true (relative to workspace).
    default: _site
  playwright_cli_args:
    description: Extra arguments appended to playwright test (e.g. --grep @a11y).
    default: ""

runs:
  using: composite
  steps:
  
    - name: Set GITHUB_HEAD_SHA environment variable
      shell: bash
      run: |
        if [ "$GITHUB_EVENT_NAME" == "pull_request" ] ; then
          echo GITHUB_HEAD_SHA=${{ github.event.pull_request.head.sha }} >> $GITHUB_ENV
        else
          echo GITHUB_HEAD_SHA=${{ github.sha }} >> $GITHUB_ENV
        fi
        
    - name: Set GITHUB_HEAD_DATE environment variable
      shell: bash
      run: |
        if [ "$GITHUB_EVENT_NAME" == "pull_request" ] ; then
          echo GITHUB_HEAD_DATE=$(date -u -d "${{ github.event.pull_request.updated_at }}" +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV
        else
          echo GITHUB_HEAD_DATE=$(date -u -d "${{ github.event.head_commit.timestamp }}" +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV
        fi

    - name: Debug environment variables
      shell: bash
      run: |
        echo "GITHUB_HEAD_SHA=$GITHUB_HEAD_SHA"
        echo "GITHUB_HEAD_DATE=$GITHUB_HEAD_DATE"

    - name: Run Playwright tests against local site
      if: ${{ inputs.with_local_site == 'true' }}
      env:
        PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
        PLAYWRIGHT_SKIP_LIVE: "1"
      run: |
        python3 -m http.server 8080 --directory "${{ inputs.site_directory }}" >/tmp/site-server.log 2>&1 &
        SERVER_PID=$!
        trap "kill $SERVER_PID" EXIT
        npx playwright test ${{ inputs.playwright_cli_args }}
      shell: bash

    - name: Run Playwright tests
      if: ${{ inputs.with_local_site != 'true' }}
      run: npx playwright test ${{ inputs.playwright_cli_args }}
      shell: bash
