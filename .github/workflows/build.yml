name: Deploy

on:
  workflow_run:
    workflows: ['Validate']
    types: [completed]
      
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Use current Node version
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          npm ci
          
      - name: Build
        run: |
          npm run build

      - name: Lint
        run: |
          npm run lintoutput

      - name: Upload site artifact for tests/deploy
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: './_site'

  test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Use current Node version
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Lint javascript tests
        run: npx eslint ./tests/

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests against built artifact
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          PLAYWRIGHT_SKIP_LIVE: "1"
        run: |
          python3 -m http.server 8080 --directory _site >/tmp/site-server.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          npx playwright test

      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Setup Github Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
