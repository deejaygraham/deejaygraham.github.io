name: Deploy

on:
  workflow_run:
    workflows: ['Validate']
    types: [completed]
      
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node CI
        uses: ./.github/actions/setup-node-ci
          
      - name: Build
        run: |
          npm run build

      - name: Lint
        run: |
          npm run lintoutput

      - name: Upload site artifact for tests/deploy
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: './_site'

  test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node CI
        uses: ./.github/actions/setup-node-ci

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Install Playwright
        uses: ./.github/actions/install-playwright

      - name: Run Playwright tests against built artifact
        uses: ./.github/actions/run-playwright
        with:
          with_local_site: "true"
          site_directory: _site

      - name: Upload Playwright report
        uses: ./.github/actions/upload-playwright-report

  deploy:
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Setup Github Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
