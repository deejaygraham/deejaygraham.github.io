name: CI + Deploy


on:
  push:
    branches: [main]
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Validate pre-build
        uses: ./.github/actions/validate-pre-build

  build:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Build
        run: npm run build

      - name: Validate site output
        uses: ./.github/actions/validate-site-output

      - name: Upload site artifact
        uses: ./.github/actions/upload-site-artifact

  test:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Install Playwright
        uses: ./.github/actions/install-playwright

      - name: Run Playwright tests
        uses: ./.github/actions/run-playwright
        with:
          with_local_site: "true"
          site_directory: _site

      - name: Upload Playwright report
        if: always()
        uses: ./.github/actions/upload-playwright-report

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
        
