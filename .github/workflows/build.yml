name: CI + Deploy


on:
  push:
    branches: [main]
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          
      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Validate pre-build
        uses: ./.github/actions/validate-pre-build

      - name: Build
        run: npm run build

      - name: Upload site artifact
        uses: ./.github/actions/upload-site-artifact
        
      - name: Inspect _site size
        run: |
          echo "::group::Total _site size"
          du -sh _site || true
          echo "::endgroup::"

          echo "::group::Top 30 largest directories under _site"
          du -h -d 3 _site 2>/dev/null | sort -hr | head -n 30 || true
          echo "::endgroup::"

          echo "::group::Top 50 largest files under _site"
          find _site -type f -printf '%s\t%p\n' 2>/dev/null \
            | sort -nr \
            | head -n 50 \
            | awk 'BEGIN {
                split("B KB MB GB TB", u);
              }
              {
                size=$1;
                path=$2;
                i=1;
                while (size >= 1024 && i < 5) {
                  size/=1024;
                  i++;
                }
                printf "%.2f %s\t%s\n", size, u[i], path;
              }'
          echo "::endgroup::"
         
      - name: Enforce _site size budget to 200MB
        run: |
          SIZE_MB=$(du -sm _site | cut -f1)
          echo "_site size: ${SIZE_MB} MB"
          if [ "$SIZE_MB" -gt 200 ]; then
            echo "Error: _site exceeds 200 MB"
            exit 1
          fi
 
      - name: Validate site output
        uses: ./.github/actions/validate-site-output

      - name: Install Playwright
        uses: ./.github/actions/install-playwright

      - name: Run Playwright tests
        uses: ./.github/actions/run-playwright
        with:
          with_local_site: "true"
          site_directory: _site

      - name: Upload Playwright report
        if: always()
        uses: ./.github/actions/upload-playwright-report

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
      
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download site artifact
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: ./_site

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
        
