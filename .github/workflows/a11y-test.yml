name: A11y Tests
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node
        uses: ./.github/actions/setup-node

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Restore social preview cache
        uses: actions/cache/restore@v6
        with:
          path: build-cache/img/previews
          key: social-previews-${{ runner.os }}-${{ hashFiles('scripts/lib/social-images/**', 'src/assets/img/favicon.png') }}
          restore-keys: |
            social-previews-${{ runner.os }}-

      - name: Build site
        run: npm run build

      - name: Install Playwright
        uses: ./.github/actions/install-playwright
        
      - name: Run a11y tests against local _site
        uses: ./.github/actions/run-playwright
        with:
          with_local_site: "true"
          site_directory: _site
          playwright_cli_args: "--grep @a11y"
        
      - name: Upload Playwright report
        uses: ./.github/actions/upload-playwright-report
