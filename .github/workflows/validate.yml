name: Validate

on:
  push:
    branches: 
      - main
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'
      - 'tests/**'
      
  workflow_dispatch:

jobs:
  validate_code:
    runs-on: ubuntu-latest
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use current Node version
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Lint javascript
        run: npx eslint . --max-warnings=0 

      - name: Lint markdown
        run: npm run mdlint

      - name: Lint post tags
        run: npm run lint:tags

      - name: Lint post frontmatter and content
        run: npm run lint:posts
        
      - name: Run unit tests
        run: npm run unit-test
