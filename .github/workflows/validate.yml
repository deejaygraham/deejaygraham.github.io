# Pre-build validation only — source, markdown, posts/tags, Playwright test sources, and 11ty unit tests.
# Built _site output is validated in the Deploy workflow after `npm run build`.

name: Validate

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.gitignore'
      - '_drafts/**'

  workflow_dispatch:

jobs:
  pre_build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        
      - name: Setup Node CI
        uses: ./.github/actions/setup-node-ci

      - name: Validate pre-build
        uses: ./.github/actions/validate-pre-build
